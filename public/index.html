<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floret</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── İKİ KOLONLU LAYOUT ── */
    .page-layout {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* ── SOL SIDEBAR ── */
    .sidebar {
      position: sticky;
      top: 72px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-profile-card {
      background: #ffffff;
      border: 1px solid #F4C0D1;
      border-radius: 18px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .sidebar-avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #C084FC, #F4C0D1);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #fff;
    }

    .sidebar-username {
      font-size: 15px;
      font-weight: 600;
      color: #1E1E2E;
    }

    .sidebar-bio {
      font-size: 12px;
      color: #9CA3AF;
      line-height: 1.5;
      font-style: italic;
    }

    .sidebar-stats {
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: center;
      padding-top: 8px;
      border-top: 1px solid #F9E8FF;
    }

    .sidebar-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .sidebar-stat-num {
      font-size: 15px;
      font-weight: 700;
      color: #7C3AED;
    }

    .sidebar-stat-label {
      font-size: 10px;
      color: #9CA3AF;
    }

    .sidebar-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }

    .sidebar-actions a,
    .sidebar-actions button {
      width: 100%;
      text-align: center;
      box-sizing: border-box;
    }

    /* Login olmayınca sidebar */
    .sidebar-guest-card {
      background: #ffffff;
      border: 1px solid #F4C0D1;
      border-radius: 18px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      text-align: center;
    }

    .sidebar-guest-card .guest-title {
      font-size: 22px;
    }

    .sidebar-guest-card p {
      font-size: 12px;
      color: #9CA3AF;
      line-height: 1.5;
    }

    .sidebar-search-card {
      background: #ffffff;
      border: 1px solid #F4C0D1;
      border-radius: 18px;
      padding: 14px 16px;
    }

    .sidebar-search-card .search-label {
      font-size: 11px;
      font-weight: 600;
      color: #9CA3AF;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── SAĞ FEED ── */
    .feed-column {
      min-width: 0;
    }

    .feed-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 0;
      padding: 0;
      max-width: none;
    }

    /* ── MOBİL ── */
    @media (max-width: 720px) {
      .page-layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
        flex-direction: row;
        flex-wrap: wrap;
      }
      .sidebar-profile-card,
      .sidebar-guest-card {
        flex: 1;
        min-width: 200px;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">🌸 Floret</a>
    <div class="navbar-right" id="navbar-right">
      <button class="btn-outline" onclick="openModal()">Login</button>
      <button class="btn-primary" onclick="openRegisterModal()">Registrieren</button>
    </div>
  </nav>

  <!-- LOGIN MODAL -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal-box" style="position:relative">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">🌸 willkommen</div>
      <input type="text" id="login-username" placeholder="Benutzername">
      <input type="password" id="login-password" placeholder="Passwort">
      <div class="error-msg" id="login-error"></div>
      <button class="btn-primary" style="width:100%;padding:10px" onclick="handleLogin()">Anmelden</button>
      <div style="text-align:center">
        <button onclick="closeModal()" style="background:none;border:none;font-size:12px;color:#9CA3AF;font-family:'Poppins',sans-serif;cursor:pointer;text-decoration:underline">
          Ohne Anmeldung weiterschauen
        </button>
      </div>
    </div>
  </div>

  <!-- REGISTER MODAL -->
  <div class="modal-overlay" id="register-modal">
    <div class="modal-box" style="position:relative">
      <button class="modal-close" onclick="closeRegisterModal()">✕</button>
      <div class="modal-title">🌸 mitmachen</div>
      <input type="text" id="reg-firstname" placeholder="Vorname">
      <input type="text" id="reg-lastname" placeholder="Nachname">
      <input type="text" id="reg-username" placeholder="Benutzername">
      <input type="email" id="reg-email" placeholder="E-Mail">
      <input type="password" id="reg-password" placeholder="Passwort">
      <div class="error-msg" id="register-error"></div>
      <button class="btn-primary" style="width:100%;padding:10px" onclick="handleRegister()">Registrieren</button>
      <div style="text-align:center">
        <button onclick="closeRegisterModal()" style="background:none;border:none;font-size:12px;color:#9CA3AF;font-family:'Poppins',sans-serif;cursor:pointer;text-decoration:underline">
          Ohne Anmeldung weiterschauen
        </button>
      </div>
    </div>
  </div>

  <!-- SAYFA LAYOUT -->
  <div class="page-layout">

    <!-- SOL SIDEBAR -->
    <aside class="sidebar">

      <!-- Login değilken -->
      <div class="sidebar-guest-card" id="sidebar-guest" style="display:flex">
        <div class="guest-title">🌸</div>
        <p>Melde dich an, um Posts zu erstellen und Kommentare zu hinterlassen.</p>
        <div style="display:flex;flex-direction:column;gap:6px;width:100%">
          <button class="btn-primary" style="width:100%" onclick="openModal()">Anmelden</button>
          <button class="btn-outline" style="width:100%" onclick="openRegisterModal()">Registrieren</button>
        </div>
      </div>

      <!-- Login olunca -->
      <div class="sidebar-profile-card" id="sidebar-profile" style="display:none">
        <div class="sidebar-avatar" id="sidebar-avatar"></div>
        <div class="sidebar-username" id="sidebar-username"></div>
        <div class="sidebar-bio" id="sidebar-bio"></div>
        <div class="sidebar-stats" id="sidebar-stats">
          <div class="sidebar-stat">
            <span class="sidebar-stat-num" id="stat-posts">–</span>
            <span class="sidebar-stat-label">Posts</span>
          </div>
          <div class="sidebar-stat">
            <span class="sidebar-stat-num" id="stat-comments">–</span>
            <span class="sidebar-stat-label">Kommentare</span>
          </div>
        </div>
        <div class="sidebar-actions">
          <a href="profile.html" class="btn-outline">✏️ Profil bearbeiten</a>
          <button class="btn-delete" style="width:100%;border-radius:20px" onclick="handleLogout()">Abmelden</button>
        </div>
      </div>

      <!-- Kullanıcı arama -->
      <div class="sidebar-search-card">
        <div class="search-label">🔍 Nutzer suchen</div>
        <div id="user-search-wrap" style="position:relative">
          <input id="user-search-input" type="text" placeholder="Username oder Name…"
            style="width:100%;border:1px solid #E9D5FF;border-radius:12px;padding:8px 12px;font-size:13px;font-family:'Poppins',sans-serif;color:#1E1E2E;background:#FFF8F5;outline:none;box-sizing:border-box">
          <div id="user-search-dropdown"
            style="display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #F4C0D1;border-radius:12px;overflow:hidden;z-index:50;box-shadow:0 4px 16px rgba(192,132,252,0.15)">
          </div>
        </div>
      </div>

    </aside>

    <!-- SAĞ: FEED -->
    <div class="feed-column">
      <div class="feed-container">

        <!-- YENİ POST KUTUSU -->
        <div class="new-post-box" id="new-post-box" style="display:none">
          <div class="avatar" id="new-post-avatar" style="flex-shrink:0"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:4px">
            <textarea id="new-post-text" placeholder="Was denkst du gerade...?"
              maxlength="120" oninput="updateCharCount()"
              style="height:36px;transition:height 0.2s"
              onfocus="this.style.height='80px'"
              onblur="if(!this.value)this.style.height='36px'"></textarea>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span id="char-count" style="font-size:11px;color:#C4A8E0">120 Zeichen übrig</span>
              <button class="btn-primary" onclick="createPost()">Posten</button>
            </div>
          </div>
        </div>

        <!-- POSTLAR -->
        <div id="feed"></div>

      </div>
    </div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
